services:
  streamlit-app:
    build:
      context: ./Apps/chatbot_ui
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./Apps/chatbot_ui/src:/app/src

  api:
    build:
      context: ./Apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point at the standalone Qdrant running on the host (holds Amazon_items_collection-00).
      - QDRANT_URL=http://host.docker.internal:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ./Apps/api/src:/app/src